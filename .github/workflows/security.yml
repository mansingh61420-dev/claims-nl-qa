name: Security Scan

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install audit tool
        run: python -m pip install --upgrade pip pip-audit

      - name: Run dependency vulnerability scan
        run: pip-audit
